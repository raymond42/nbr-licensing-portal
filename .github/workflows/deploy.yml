name: Deploy

on:
  workflow_dispatch:
    inputs:
      app:
        description: 'Which app to deploy'
        required: true
        type: choice
        options: [api, web]

jobs:
  deploy-api:
    name: API deployment notes
    if: ${{ inputs.app == 'api' }}
    runs-on: ubuntu-latest
    steps:
      - name: Explain API deployment
        run: |
          echo "API deployment is platform-managed."
          echo "Recommended target: Railway or Render using apps/api/Dockerfile or Node build commands from README."
          echo "Run Prisma migrate deploy once per release before scaling multiple API replicas."

  deploy-web:
    name: Web deployment notes
    if: ${{ inputs.app == 'web' }}
    runs-on: ubuntu-latest
    steps:
      - name: Explain web deployment
        run: |
          echo "Web deployment is platform-managed."
          echo "Recommended target: Vercel pointed at apps/web or repo-root filtered pnpm commands."
          echo "Set NEXT_PUBLIC_API_URL to the deployed API URL including /api."
