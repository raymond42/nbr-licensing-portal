services:
  postgres:
    image: postgres:16-alpine
    container_name: nbr_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nbr}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nbr}
      POSTGRES_DB: ${POSTGRES_DB:-nbr_licensing}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-nbr} -d ${POSTGRES_DB:-nbr_licensing}']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.dev
    container_name: nbr_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 3001
      FRONTEND_URL: http://localhost:3000
      CORS_ORIGIN: http://localhost:3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-nbr}:${POSTGRES_PASSWORD:-nbr}@postgres:5432/${POSTGRES_DB:-nbr_licensing}?schema=public
      JWT_SECRET: ${JWT_SECRET:-nbr-local-development-secret}
      JWT_EXPIRES_IN: 3600s
      MAX_UPLOAD_SIZE_BYTES: 5242880
      UPLOAD_DIR: /workspace/apps/api/uploads
    command: >
      sh -c "pnpm --filter @nbr/shared build &&
             pnpm --filter @nbr/api exec prisma generate &&
             pnpm --filter @nbr/api run dev"
    ports:
      - '3001:3001'
    volumes:
      - .:/workspace
      - root_node_modules:/workspace/node_modules
      - api_node_modules:/workspace/apps/api/node_modules
      - shared_node_modules:/workspace/packages/shared/node_modules
      - ./apps/api/uploads:/workspace/apps/api/uploads

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile.dev
    container_name: nbr_web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:3001/api
      WATCHPACK_POLLING: 'true'
      CHOKIDAR_USEPOLLING: 'true'
    command: >
      sh -c "pnpm --filter @nbr/shared build &&
             pnpm --filter @nbr/web exec next dev -p 3000 -H 0.0.0.0"
    ports:
      - '3000:3000'
    volumes:
      - .:/workspace
      - root_node_modules:/workspace/node_modules
      - web_node_modules:/workspace/apps/web/node_modules
      - shared_node_modules:/workspace/packages/shared/node_modules
      - web_next:/workspace/apps/web/.next

volumes:
  postgres_data:
  root_node_modules:
  api_node_modules:
  web_node_modules:
  shared_node_modules:
  web_next:
